media:
  - name: images
    label: Images
    input: images
    output: /images
    extensions: [svg, png, jpg, jpeg, webp, gif]

content:

  # ═══════════════════════════════════════════════
  #  🔔  SITE-WIDE
  # ═══════════════════════════════════════════════

  - name: site_banner
    label: "🔔 Site Banner (all pages)"
    type: file
    path: data/banner.json
    format: json
    fields:
      - name: enabled
        label: Show banner?
        type: boolean
        description: "Turn on to display the banner at the top of every page. Turn off to hide it."
      - name: message
        label: Message
        type: string
        description: "The text shown in the banner. e.g. Our annual concert is coming up on the 25th of July."
      - name: link_text
        label: Link text (optional)
        type: string
        description: "e.g. Click here for details — leave blank for no link"
      - name: link_url
        label: Link URL (optional)
        type: string
        description: "Full URL including https:// — leave blank for no link"

  # ═══════════════════════════════════════════════
  #  🏠  HOME PAGE
  # ═══════════════════════════════════════════════

  - name: home_term_dates
    label: "🏠 Home — Term Dates"
    type: file
    path: data/term-dates.json
    format: json
    fields:
      - name: terms
        label: Terms
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{name} — {dates}"
        fields:
          - name: name
            label: Term
            type: string
            description: "e.g. Term 1"
          - name: lessons
            label: Number of lessons
            type: string
            description: "e.g. 8 lessons"
          - name: dates
            label: Dates
            type: string
            description: "e.g. 8 Feb – 5 Apr"
      - name: note
        label: Note below the table
        type: string
        description: "Small reminder shown under the term dates table"

  - name: home_fees
    label: "🏠 Home — Fees & Funding"
    type: file
    path: data/fees.json
    format: json
    fields:
      - name: title
        label: Section title
        type: string
        description: "Heading shown above this section, e.g. Fees & Funding"
      - name: intro
        label: Intro paragraph
        type: text
        description: "Short paragraph shown under the heading."
      - name: fee_box
        label: Highlighted fee box (left side)
        type: object
        fields:
          - name: label
            label: Top label
            type: string
            description: "e.g. Annual Tuition Fee"
          - name: amount
            label: Amount
            type: string
            description: "Big number, e.g. $210"
          - name: period
            label: Period text
            type: string
            description: "Small text under the amount, e.g. per student, per year (all four terms)"
          - name: items
            label: Bullet points inside the box
            type: string
            list: true
            description: "One bullet per line. Each appears with a tick beside it."
      - name: notes
        label: Notes (right side)
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{heading}"
        fields:
          - name: heading
            label: Heading
            type: string
            description: "e.g. Sibling discounts"
          - name: body
            label: Body text
            type: text

  - name: home_site_settings
    label: "🏠 Home — Stats & Site Settings"
    type: file
    path: data/site-settings.json
    format: json
    fields:
      - name: stats
        label: Key Stats (the 4 numbers displayed on the home page)
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{value} {label}"
        fields:
          - name: value
            label: Value
            type: string
            description: "e.g. 10+  or  $210  or  25 min"
          - name: label
            label: Label
            type: string
            description: "e.g. Instruments  or  Per Year"
      - name: price_per_year
        label: Annual fee (used in text)
        type: string
        description: "e.g. $210 — update here if fees change"
      - name: lesson_duration_minutes
        label: Lesson duration (minutes)
        type: number
        description: "e.g. 25"
      - name: class_size
        label: Typical class size
        type: string
        description: "e.g. 4–6 students"
  - name: home_enrolment
    label: "Home - How to Enrol"
    type: file
    path: data/enrolment.json
    format: json
    fields:
      - name: title
        label: Section title
        type: string
        description: "Heading shown above the enrolment steps."
      - name: intro
        label: Intro paragraph
        type: text
        description: "Short paragraph shown under the heading."
      - name: steps
        label: Steps
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{number}. {heading}"
        fields:
          - name: number
            label: Step number
            type: string
            description: "Usually 1, 2, 3, 4."
          - name: heading
            label: Heading
            type: string
          - name: body
            label: Body text
            type: text
          - name: link_text
            label: Link text (optional)
            type: string
            description: "Leave blank for no link."
          - name: link_url
            label: Link URL (optional)
            type: string
            description: "Relative URL such as classes.html, or a full https:// URL."
      - name: contact_box
        label: Contact box
        type: object
        fields:
          - name: heading
            label: Heading
            type: string
          - name: items
            label: Contact items
            type: object
            list:
              collapsible: true
              collapsed: false
              summary: "{label}: {value}"
            fields:
              - name: icon
                label: Icon
                type: string
                description: "Small symbol shown beside this contact item."
              - name: label
                label: Label
                type: string
              - name: value
                label: Value
                type: text
              - name: url
                label: Link URL (optional)
                type: string
                description: "Use mailto: for email, tel: for phone, or leave blank for plain text."

  # ═══════════════════════════════════════════════
  #  📖  CLASSES PAGE
  # ═══════════════════════════════════════════════

  - name: classes_instruments
    label: "📖 Classes — Instrument Classes"
    type: file
    path: data/instruments.json
    format: json
    fields:
      - name: instruments
        label: Instruments
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{name}"
        fields:
          - name: name
            label: Name
            type: string
          - name: emoji
            label: Icon (emoji)
            type: string
            description: "Single emoji, e.g. 🎻"
          - name: summary
            label: Short description (Home page)
            type: string
            description: "One sentence shown on the home page grid"
          - name: description
            label: Full description (Classes page)
            type: text
            description: "Full paragraph shown on the Classes page. Include hire costs, waitlist notes, etc."
          - name: tag
            label: Age / tag badge
            type: string
            description: "e.g. Ages 7+   or   Free!   or   2+ years experience"
          - name: free
            label: Free class?
            type: boolean
            description: "Turn on for classes with no extra cost (e.g. Choir, Orchestra)"
          - name: show_on_home
            label: Show on Home page?
            type: boolean
            description: "Should this instrument appear in the grid on the home page?"

  - name: classes_faqs
    label: "📖 Classes — FAQs"
    type: file
    path: data/faqs.json
    format: json
    fields:
      - name: faqs
        label: Questions & Answers
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{question}"
        fields:
          - name: question
            label: Question
            type: string
          - name: answer
            label: Answer
            type: text
            description: "Update prices, waitlist notes, and other details here."

  # ═══════════════════════════════════════════════
  #  🎻  ORCHESTRA PAGE
  # ═══════════════════════════════════════════════

  - name: orchestra_details
    label: "Orchestra - Groups & Practical Details"
    type: file
    path: data/orchestra-details.json
    format: json
    fields:
      - name: when
        label: When
        type: string
        description: "e.g. Saturday mornings - Ensemble 9:30-10:00 am, Orchestra 9:30-11:30 am"
      - name: where
        label: Where
        type: string
        description: "Address"
      - name: cost
        label: Cost
        type: string
        description: "e.g. Free"
      - name: bring
        label: What to bring
        type: string
      - name: instrument_hire
        label: Instrument hire
        type: text
        description: "Shown in the practical details list."
      - name: groups
        label: Orchestra groups
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{name} - {subtitle}"
        fields:
          - name: name
            label: Group name
            type: string
            description: "e.g. Ensemble or Orchestra"
          - name: subtitle
            label: Subtitle
            type: string
            description: "e.g. Junior Orchestra"
          - name: experience
            label: Experience
            type: text
            description: "Experience guidance for this group."
          - name: schedule
            label: Schedule
            type: string
            description: "When and where this group meets."
      - name: contact_note
        label: Contact / audition note
        type: string
        description: "Shown at the bottom of the 'Who Is It For?' section"

  # ═══════════════════════════════════════════════
  #  👥  ABOUT PAGE
  # ═══════════════════════════════════════════════

  - name: about_teachers
    label: "👥 About — Teachers"
    type: file
    path: data/teachers.json
    format: json
    fields:
      - name: teachers
        label: Teachers
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{name} — {role}"
        fields:
          - name: name
            label: Full name
            type: string
          - name: role
            label: Instruments / role
            type: string
            description: "e.g. Cello  or  Guitar & Keyboard"
          - name: bio
            label: Bio
            type: text
            description: "1–2 sentences. Leave blank to hide."

  - name: about_committee
    label: "👥 About — Committee"
    type: file
    path: data/committee.json
    format: json
    fields:
      - name: committee
        label: Committee members
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{name} — {role}"
        fields:
          - name: name
            label: Name
            type: string
            description: "Full name, or leave as 'Committee Member' if not yet confirmed"
          - name: role
            label: Role
            type: string
            description: "e.g. Chairperson, Secretary, Treasurer, Gallery Coordinator"
          - name: bio
            label: Bio (optional)
            type: text
            description: "Short bio. Leave blank to hide."

  # ═══════════════════════════════════════════════
  #  💬  FUTURE CONTENT (add when ready)
  # ═══════════════════════════════════════════════

  - name: testimonials
    label: "💬 Testimonials (add when you have real quotes)"
    type: file
    path: data/testimonials.json
    format: json
    fields:
      - name: testimonials
        label: Testimonials
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{author}"
        fields:
          - name: quote
            label: Quote
            type: text
            description: "The parent's words — no quotation marks needed."
          - name: author
            label: Attribution
            type: string
            description: "e.g. Parent of a violin student"

settings:
  hide: true
